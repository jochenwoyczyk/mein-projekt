<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>MEMORY CHAOS DELUXE!</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 15px;
      overflow-x: hidden;
      transition: filter 0.5s;
    }
    body.night-mode {
      background: #000 !important;
    }
    #flashlight {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 50;
      pointer-events: none;
    }
    body.night-mode #flashlight { display: block; }

    h1 {
      font-size: 2.2rem;
      margin: 5px 0;
      text-shadow: 0 0 20px rgba(255,100,200,0.8);
      animation: titlePulse 2s ease-in-out infinite;
    }
    @keyframes titlePulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    /* Top bar */
    #topBar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      align-items: center;
      margin: 8px 0;
      width: 100%;
      max-width: 750px;
    }
    #stats { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    #stats span, #timer, #comboDisplay {
      background: rgba(255,255,255,0.1);
      padding: 6px 14px;
      border-radius: 16px;
      font-size: 1rem;
    }
    #timer { font-weight: bold; }
    #timer.panic { background: rgba(255,0,0,0.4); animation: timerPanic 0.3s infinite; }
    @keyframes timerPanic { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
    #comboDisplay { background: rgba(255,200,0,0.3); display: none; }
    #comboDisplay.show { display: block; animation: comboFlash 0.3s; }
    @keyframes comboFlash { 0%{transform:scale(1.4)} 100%{transform:scale(1)} }

    /* Difficulty selector */
    #diffSelect {
      display: flex;
      gap: 8px;
      margin: 5px 0;
    }
    #diffSelect button {
      padding: 6px 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 20px;
      background: transparent;
      color: white;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    #diffSelect button.active {
      background: linear-gradient(135deg, #6c5ce7, #a855f7);
      border-color: #a855f7;
    }
    #diffSelect button:hover { border-color: #a855f7; }

    /* Power-ups */
    #powerUps {
      display: flex;
      gap: 8px;
      margin: 5px 0;
    }
    .powerBtn {
      padding: 6px 14px;
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      color: white;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.3s;
    }
    .powerBtn:hover:not(:disabled) { background: rgba(255,255,255,0.15); transform: scale(1.05); }
    .powerBtn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* Board */
    #boardWrapper {
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      width: 100%;
      max-width: 700px;
    }
    #board {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
      width: 100%;
      transition: transform 0.3s;
    }
    .card {
      aspect-ratio: 1;
      border-radius: 14px;
      cursor: pointer;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      user-select: none;
    }
    .card.flipped { transform: rotateY(180deg); }
    .card.matched { animation: matchBounce 0.6s ease; }
    .card.matched .front {
      background: linear-gradient(135deg, #00c853, #00e676);
      box-shadow: 0 0 30px rgba(0,200,80,0.6);
    }
    .card .front, .card .back {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 14px;
      backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card .emoji {
      font-size: 2.5rem;
      transition: font-size 1s ease;
    }
    .card .back {
      background: linear-gradient(135deg, #6c5ce7, #a855f7);
      box-shadow: 0 4px 15px rgba(108,92,231,0.4);
      font-size: 1.8rem;
    }
    .card .back:hover { box-shadow: 0 4px 25px rgba(168,85,247,0.7); }
    .card .front {
      background: linear-gradient(135deg, #fd79a8, #e84393);
      transform: rotateY(180deg);
      box-shadow: 0 4px 15px rgba(232,67,147,0.4);
    }
    .card.frozen .front {
      background: linear-gradient(135deg, #74b9ff, #0984e3);
      box-shadow: 0 0 20px rgba(9,132,227,0.6);
    }
    .card.frozen::after {
      content: '❄️';
      position: absolute;
      top: 2px;
      right: 4px;
      font-size: 0.9rem;
      z-index: 5;
    }
    .card.troll-card .back {
      background: linear-gradient(135deg, #e17055, #d63031);
      animation: trollGlow 1s infinite;
    }
    @keyframes trollGlow {
      0%,100% { box-shadow: 0 0 10px rgba(214,48,49,0.4); }
      50% { box-shadow: 0 0 25px rgba(214,48,49,0.8); }
    }

    @keyframes matchBounce {
      0% { transform: rotateY(180deg) scale(1); }
      30% { transform: rotateY(180deg) scale(1.25); }
      60% { transform: rotateY(180deg) scale(0.9); }
      100% { transform: rotateY(180deg) scale(1); }
    }
    .card.shake {
      animation: shake 0.5s ease;
    }
    @keyframes shake {
      0%,100% { transform: rotateY(180deg) translateX(0); }
      20% { transform: rotateY(180deg) translateX(-8px); }
      40% { transform: rotateY(180deg) translateX(8px); }
      60% { transform: rotateY(180deg) translateX(-5px); }
      80% { transform: rotateY(180deg) translateX(5px); }
    }
    @keyframes dance1 {
      0%,100% { transform: rotateY(180deg) translateY(0) rotate(0deg); }
      25% { transform: rotateY(180deg) translateY(-8px) rotate(-5deg); }
      50% { transform: rotateY(180deg) translateY(0) rotate(0deg); }
      75% { transform: rotateY(180deg) translateY(-8px) rotate(5deg); }
    }
    @keyframes dance2 {
      0%,100% { transform: rotateY(180deg) scale(1); }
      25% { transform: rotateY(180deg) scale(1.1) rotate(3deg); }
      50% { transform: rotateY(180deg) scale(0.95); }
      75% { transform: rotateY(180deg) scale(1.1) rotate(-3deg); }
    }
    @keyframes dance3 {
      0%,100% { transform: rotateY(180deg) translateX(0); }
      25% { transform: rotateY(180deg) translateX(-6px) rotate(-3deg); }
      75% { transform: rotateY(180deg) translateX(6px) rotate(3deg); }
    }
    .card.dancing { animation: dance1 0.6s infinite ease-in-out; }
    .card.dancing:nth-child(3n+1) { animation-name: dance2; }
    .card.dancing:nth-child(3n+2) { animation-name: dance3; }

    @keyframes boardShake {
      0%,100% { transform: translate(0,0) rotate(0deg); }
      10% { transform: translate(-10px,5px) rotate(-1deg); }
      30% { transform: translate(10px,-5px) rotate(1deg); }
      50% { transform: translate(-5px,10px) rotate(-0.5deg); }
      70% { transform: translate(5px,-10px) rotate(0.5deg); }
      90% { transform: translate(-3px,3px) rotate(0deg); }
    }
    .board-fart { animation: boardShake 0.8s ease; }

    /* Messages */
    #message {
      height: 35px;
      font-size: 1.3rem;
      text-align: center;
      transition: opacity 0.5s;
    }

    /* Kommentator */
    #commentator {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(0,0,0,0.85);
      border: 2px solid #a855f7;
      border-radius: 16px;
      padding: 12px 18px;
      max-width: 280px;
      font-size: 1rem;
      z-index: 60;
      transform: translateX(350px);
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #commentator.show { transform: translateX(0); }
    #commentator .komm-emoji { font-size: 1.8rem; margin-right: 8px; }

    /* Highscore */
    #highscorePanel {
      display: none;
      background: rgba(0,0,0,0.85);
      border: 2px solid #a855f7;
      border-radius: 16px;
      padding: 20px;
      margin-top: 15px;
      max-width: 400px;
      width: 100%;
    }
    #highscorePanel.show { display: block; }
    #highscorePanel h2 { text-align: center; margin-bottom: 10px; }
    .hs-row {
      display: flex;
      justify-content: space-between;
      padding: 5px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .hs-row.you { color: #ffd93d; font-weight: bold; }

    /* Win overlay */
    #win {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
    }
    #win.show { display: flex; }
    #win button {
      margin-top: 20px;
      padding: 12px 35px;
      font-size: 1.2rem;
      border: none;
      border-radius: 30px;
      background: linear-gradient(135deg, #6c5ce7, #a855f7);
      color: white;
      cursor: pointer;
      transition: transform 0.2s;
    }
    #win button:hover { transform: scale(1.1); }

    /* Confetti */
    @keyframes confetti {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
    .confetti {
      position: fixed;
      top: -10px;
      border-radius: 2px;
      z-index: 101;
      animation: confetti 3s ease-out forwards;
    }

    /* Fart cloud */
    @keyframes fartCloud {
      0% { transform: scale(0); opacity: 0.8; }
      50% { transform: scale(1.5); opacity: 0.6; }
      100% { transform: scale(2.5); opacity: 0; }
    }
    .fart-cloud {
      position: fixed;
      font-size: 4rem;
      z-index: 55;
      pointer-events: none;
      animation: fartCloud 1.5s ease-out forwards;
    }

    /* X-ray overlay */
    #xrayOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,255,100,0.05);
      z-index: 45;
      pointer-events: none;
      border: 3px solid rgba(0,255,100,0.3);
    }
    #xrayOverlay.show { display: block; animation: xrayPulse 0.5s infinite; }
    @keyframes xrayPulse {
      0%,100% { border-color: rgba(0,255,100,0.3); }
      50% { border-color: rgba(0,255,100,0.7); }
    }
  </style>
</head>
<body>
  <h1>MEMORY CHAOS DELUXE!</h1>
  <div id="message"></div>
  <div id="topBar">
    <div id="stats">
      <span>Paare: <b id="pairs">0</b>/15</span>
      <span>Versuche: <b id="attempts">0</b></span>
      <span id="timer">⏱ 2:00</span>
      <span id="comboDisplay">COMBO x1</span>
    </div>
  </div>
  <div id="diffSelect">
    <button class="active" onclick="setDifficulty('easy')">😊 Easy</button>
    <button onclick="setDifficulty('hard')">😈 Hard</button>
    <button onclick="setDifficulty('chaos')">🤯 CHAOS</button>
  </div>
  <div id="powerUps">
    <button class="powerBtn" id="btnXray" onclick="useXray()">🔍 Roentgenblick (1x)</button>
    <button class="powerBtn" id="btnFreeze" onclick="useFreeze()">❄️ Freeze (2x)</button>
    <button class="powerBtn" id="btnNight" onclick="toggleNight()">🌙 Nacht-Modus</button>
  </div>
  <div id="boardWrapper">
    <div id="board"></div>
  </div>
  <div id="flashlight"></div>
  <div id="xrayOverlay"></div>

  <div id="commentator">
    <span class="komm-emoji">🎙️</span>
    <span id="kommText">Willkommen zum Memory Chaos!</span>
  </div>

  <div id="highscorePanel">
    <h2>🏆 Highscores</h2>
    <div id="highscoreList"></div>
  </div>

  <div id="win">
    <div id="winText"></div>
    <button onclick="startGame()">Nochmal!</button>
  </div>

  <script>
    const characters = [
      { emoji: '🐸', name: 'Frosch',    freq: 220,  type: 'ribbit' },
      { emoji: '🦊', name: 'Fuchs',     freq: 440,  type: 'yip' },
      { emoji: '🐷', name: 'Schwein',   freq: 180,  type: 'oink' },
      { emoji: '🦄', name: 'Einhorn',   freq: 880,  type: 'sparkle' },
      { emoji: '🐙', name: 'Krake',     freq: 150,  type: 'blob' },
      { emoji: '🤡', name: 'Clown',     freq: 350,  type: 'honk' },
      { emoji: '👻', name: 'Geist',     freq: 600,  type: 'woo' },
      { emoji: '🤖', name: 'Roboter',   freq: 120,  type: 'beep' },
      { emoji: '🦖', name: 'Dino',      freq: 80,   type: 'roar' },
      { emoji: '🐔', name: 'Huhn',      freq: 500,  type: 'cluck' },
      { emoji: '🎃', name: 'Kuerbis',   freq: 200,  type: 'spooky' },
      { emoji: '🐵', name: 'Affe',      freq: 700,  type: 'ooh' },
      { emoji: '🦜', name: 'Papagei',   freq: 1000, type: 'squawk' },
      { emoji: '🐲', name: 'Drache',    freq: 100,  type: 'fire' },
      { emoji: '💩', name: 'Poop',      freq: 280,  type: 'plop' },
    ];

    const funnyMessages = [
      'Neeee!', 'Haha, daneben!', 'Fast... aber nur fast!',
      'Oje oje!', 'Das war nix!', 'Konzentration!', 'Ups!',
      'Nicht ganz...', 'Augen auf!', 'Wackelpudding-Gehirn!',
      'Hast du Tomaten auf den Augen?', 'Mein Goldfisch kann das besser!'
    ];
    const matchMessages = [
      'BOOM!', 'Genie!', 'Wie ein Boss!', 'Mega!',
      'Unglaublich!', 'Du bist on fire!', 'Zack!',
      'Hammer!', 'Perfekt!', 'Yesss!', 'LEGENDAER!'
    ];

    const commentaryStart = [
      'Und das Spiel beginnt! Wer wird heute Memory-Champion?',
      'Die Karten liegen bereit. Wird unser Spieler brillieren oder versagen?',
      'Meine Damen und Herren, willkommen zur Memory-WM!'
    ];
    const commentaryMiss = [
      'Oh nein! Das war wohl nichts!',
      'Autsch! Das hat wehgetan!',
      'Hat unser Spieler etwa die Augen zu?!',
      'Das sah ja selbst meine Oma besser!',
      'KATASTROPHE auf dem Spielfeld!',
      'Was macht er da? WAS MACHT ER DA?!',
      'Ich glaub ich seh nicht recht...',
      'Das Publikum buh-t!',
      'Sogar der Goldfisch hat aufgehoert zuzuschauen.',
      'Ich wuerde ja helfen, aber ich bin nur ein Kommentator.'
    ];
    const commentaryMatch = [
      'JAAA! TOOOR! Oh warte, falsches Spiel.',
      'BRILLANT! Einfach brillant!',
      'Das war WELTKLASSE!',
      'Die Menge tobt! ...also, ich tobe.',
      'UNGLAUBLICH! Wie hat er das gesehen?!',
      'Ich hab Gaensehaut! GAENSEHAUT!',
      'So muss das! Lehrbuchmaessig!',
      'Mein Therapeut sagt ich soll aufhoeren zu schreien, aber DAS WAR FANTASTISCH!'
    ];
    const commentaryCombo = [
      'COMBO! Der Spieler ist nicht zu stoppen!',
      'MEGA-COMBO! Ruft den Notarzt, der Gegner braucht Hilfe!',
      'ULTRA-COMBO! Ist das ueberhaupt legal?!',
      'WAHNSINN! Eine Combo nach der anderen!',
      'COMBO-ALARM! Die Arena bebt!'
    ];
    const commentaryFart = [
      'Was... was ist das fuer ein Geruch?!',
      'ACHTUNG! Biologische Waffe detektiert!',
      'Die Jury prueft ob das regelkonform war...',
      'Ich brauche eine Gasmaske!'
    ];
    const commentaryWin = [
      'ER HAT ES GESCHAFFT! MEMORY-WELTMEISTER!!!',
      'HISTORISCH! Diesen Moment werden wir nie vergessen!',
      'Die Legende ist komplett! Absoluter WAHNSINN!'
    ];
    const commentaryTroll = [
      'HAHAHA! Die Troll-Karte schlaegt zu!',
      'Oh oh... das wird unserem Spieler nicht gefallen!',
      'CHAOS! Die Troll-Karte mischt alles auf!'
    ];
    const commentarySlow = [
      'Aehhh... macht unser Spieler eine Pause?',
      'Hallo? Ist da noch jemand?',
      'Die Zeit laeuft, schlaeft der etwa?!',
      '*gaeehn* ... oh! Spielen wir noch?'
    ];

    const botNames = [
      'Oma Gertrude', 'Baby Yoda', 'Kaptn Socke', 'Prof. Schnurrbart',
      'DJ Kartoffel', 'Sir Wackelpo', 'Graf Zockula', 'Herr Spaghetti',
      'Tante Wi-Fi', 'Dr. Banane', 'Agent Pudding', 'Ninja Opa',
      'Frau Pixel', 'Baron Blubb', 'Chef Chaos'
    ];

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // Game state
    let cards = [];
    let cardElements = [];
    let flippedCards = [];
    let matchedPairs = 0;
    let attempts = 0;
    let locked = false;
    let combo = 0;
    let consecutiveMisses = 0;
    let difficulty = 'easy';
    let timeLeft = 120;
    let timerInterval = null;
    let panicInterval = null;
    let xrayUses = 1;
    let freezeUses = 2;
    let frozenCard = null;
    let nightMode = false;
    let trollActive = false;
    let emojiScale = 2.5;
    let lastActionTime = Date.now();
    let idleInterval = null;
    let drunkAngle = 0;

    // ====== SOUNDS ======
    function playSound(char) {
      const t = audioCtx.currentTime;
      const master = audioCtx.createGain();
      master.gain.setValueAtTime(0.3, t);
      master.gain.exponentialRampToValueAtTime(0.001, t + 0.8);
      master.connect(audioCtx.destination);

      switch (char.type) {
        case 'ribbit': {
          const o = audioCtx.createOscillator(); o.type = 'square';
          o.frequency.setValueAtTime(char.freq, t);
          o.frequency.exponentialRampToValueAtTime(char.freq * 2, t + 0.1);
          o.frequency.exponentialRampToValueAtTime(char.freq, t + 0.2);
          o.connect(master); o.start(t); o.stop(t + 0.4); break;
        }
        case 'yip': {
          const o = audioCtx.createOscillator(); o.type = 'sawtooth';
          o.frequency.setValueAtTime(char.freq, t);
          o.frequency.exponentialRampToValueAtTime(char.freq * 1.5, t + 0.05);
          o.frequency.exponentialRampToValueAtTime(char.freq * 0.8, t + 0.15);
          o.connect(master); o.start(t); o.stop(t + 0.3); break;
        }
        case 'oink': {
          const o = audioCtx.createOscillator(); o.type = 'sine';
          o.frequency.setValueAtTime(char.freq, t);
          o.frequency.linearRampToValueAtTime(char.freq * 1.3, t + 0.1);
          o.frequency.linearRampToValueAtTime(char.freq * 0.7, t + 0.3);
          o.connect(master); o.start(t); o.stop(t + 0.5); break;
        }
        case 'sparkle': {
          for (let i = 0; i < 5; i++) {
            const o = audioCtx.createOscillator(); o.type = 'sine';
            o.frequency.setValueAtTime(char.freq + i * 200, t + i * 0.08);
            const g = audioCtx.createGain();
            g.gain.setValueAtTime(0.15, t + i * 0.08);
            g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.08 + 0.3);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(t + i * 0.08); o.stop(t + i * 0.08 + 0.3);
          } break;
        }
        case 'blob': {
          const o = audioCtx.createOscillator(); o.type = 'sine';
          o.frequency.setValueAtTime(char.freq, t);
          o.frequency.exponentialRampToValueAtTime(char.freq * 3, t + 0.1);
          o.frequency.exponentialRampToValueAtTime(char.freq * 0.5, t + 0.4);
          o.connect(master); o.start(t); o.stop(t + 0.5); break;
        }
        case 'honk': {
          const o = audioCtx.createOscillator(); o.type = 'sawtooth';
          o.frequency.setValueAtTime(char.freq, t);
          const g = audioCtx.createGain();
          g.gain.setValueAtTime(0.4, t); g.gain.setValueAtTime(0, t + 0.15);
          g.gain.setValueAtTime(0.4, t + 0.2);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
          o.connect(g); g.connect(audioCtx.destination);
          o.start(t); o.stop(t + 0.5); break;
        }
        case 'woo': {
          const o = audioCtx.createOscillator(); o.type = 'sine';
          o.frequency.setValueAtTime(char.freq, t);
          o.frequency.linearRampToValueAtTime(char.freq * 1.5, t + 0.3);
          o.frequency.linearRampToValueAtTime(char.freq * 0.5, t + 0.8);
          master.gain.setValueAtTime(0.2, t);
          master.gain.exponentialRampToValueAtTime(0.001, t + 1);
          o.connect(master); o.start(t); o.stop(t + 1); break;
        }
        case 'beep': {
          for (let i = 0; i < 3; i++) {
            const o = audioCtx.createOscillator(); o.type = 'square';
            o.frequency.setValueAtTime(char.freq * (i + 1), t + i * 0.12);
            const g = audioCtx.createGain();
            g.gain.setValueAtTime(0.2, t + i * 0.12);
            g.gain.setValueAtTime(0, t + i * 0.12 + 0.08);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(t + i * 0.12); o.stop(t + i * 0.12 + 0.1);
          } break;
        }
        case 'roar': {
          const o = audioCtx.createOscillator(); o.type = 'sawtooth';
          o.frequency.setValueAtTime(char.freq, t);
          o.frequency.exponentialRampToValueAtTime(char.freq * 4, t + 0.2);
          o.frequency.exponentialRampToValueAtTime(char.freq * 0.5, t + 0.8);
          master.gain.setValueAtTime(0.35, t);
          master.gain.exponentialRampToValueAtTime(0.001, t + 1);
          o.connect(master); o.start(t); o.stop(t + 1); break;
        }
        case 'cluck': {
          for (let i = 0; i < 4; i++) {
            const o = audioCtx.createOscillator(); o.type = 'triangle';
            o.frequency.setValueAtTime(char.freq, t + i * 0.1);
            o.frequency.exponentialRampToValueAtTime(char.freq * 0.5, t + i * 0.1 + 0.05);
            const g = audioCtx.createGain();
            g.gain.setValueAtTime(0.25, t + i * 0.1);
            g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.1 + 0.08);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(t + i * 0.1); o.stop(t + i * 0.1 + 0.08);
          } break;
        }
        case 'spooky': {
          const o = audioCtx.createOscillator(); o.type = 'sine';
          o.frequency.setValueAtTime(char.freq, t);
          o.frequency.linearRampToValueAtTime(char.freq * 0.7, t + 0.3);
          o.frequency.linearRampToValueAtTime(char.freq * 1.2, t + 0.6);
          const o2 = audioCtx.createOscillator(); o2.type = 'sine';
          o2.frequency.setValueAtTime(char.freq + 5, t);
          o.connect(master); o2.connect(master);
          o.start(t); o.stop(t + 0.8); o2.start(t); o2.stop(t + 0.8); break;
        }
        case 'ooh': {
          const o = audioCtx.createOscillator(); o.type = 'sine';
          o.frequency.setValueAtTime(char.freq, t);
          o.frequency.setValueAtTime(char.freq * 1.2, t + 0.15);
          o.frequency.setValueAtTime(char.freq, t + 0.3);
          o.frequency.setValueAtTime(char.freq * 1.4, t + 0.45);
          o.connect(master); o.start(t); o.stop(t + 0.6); break;
        }
        case 'squawk': {
          const o = audioCtx.createOscillator(); o.type = 'sawtooth';
          o.frequency.setValueAtTime(char.freq, t);
          o.frequency.exponentialRampToValueAtTime(char.freq * 2, t + 0.05);
          o.frequency.exponentialRampToValueAtTime(char.freq * 0.5, t + 0.1);
          o.frequency.exponentialRampToValueAtTime(char.freq * 1.8, t + 0.15);
          master.gain.setValueAtTime(0.2, t);
          o.connect(master); o.start(t); o.stop(t + 0.4); break;
        }
        case 'fire': {
          const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.5, audioCtx.sampleRate);
          const d = buf.getChannelData(0);
          for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
          const noise = audioCtx.createBufferSource(); noise.buffer = buf;
          const flt = audioCtx.createBiquadFilter(); flt.type = 'lowpass';
          flt.frequency.setValueAtTime(char.freq * 5, t);
          flt.frequency.exponentialRampToValueAtTime(char.freq, t + 0.5);
          const g = audioCtx.createGain();
          g.gain.setValueAtTime(0.4, t);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
          noise.connect(flt); flt.connect(g); g.connect(audioCtx.destination);
          noise.start(t); noise.stop(t + 0.6);
          const o = audioCtx.createOscillator(); o.type = 'sawtooth';
          o.frequency.setValueAtTime(char.freq, t);
          o.frequency.exponentialRampToValueAtTime(char.freq * 3, t + 0.3);
          const g2 = audioCtx.createGain();
          g2.gain.setValueAtTime(0.2, t);
          g2.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
          o.connect(g2); g2.connect(audioCtx.destination);
          o.start(t); o.stop(t + 0.5); break;
        }
        case 'plop': {
          const o = audioCtx.createOscillator(); o.type = 'sine';
          o.frequency.setValueAtTime(char.freq * 3, t);
          o.frequency.exponentialRampToValueAtTime(char.freq * 0.3, t + 0.2);
          master.gain.setValueAtTime(0.4, t);
          master.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
          o.connect(master); o.start(t); o.stop(t + 0.3); break;
        }
        case 'troll': {
          // Evil laugh sound
          for (let i = 0; i < 6; i++) {
            const o = audioCtx.createOscillator(); o.type = 'sawtooth';
            o.frequency.setValueAtTime(200 + i * 50, t + i * 0.12);
            o.frequency.exponentialRampToValueAtTime(100 + i * 30, t + i * 0.12 + 0.1);
            const g = audioCtx.createGain();
            g.gain.setValueAtTime(0.2, t + i * 0.12);
            g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.12 + 0.1);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(t + i * 0.12); o.stop(t + i * 0.12 + 0.12);
          } break;
        }
      }
    }

    function playFartSound() {
      const t = audioCtx.currentTime;
      const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 1.2, audioCtx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) {
        d[i] = (Math.random() * 2 - 1) * Math.sin(i / (audioCtx.sampleRate * 0.01));
      }
      const noise = audioCtx.createBufferSource(); noise.buffer = buf;
      const flt = audioCtx.createBiquadFilter(); flt.type = 'lowpass';
      flt.frequency.setValueAtTime(200, t);
      flt.frequency.linearRampToValueAtTime(80, t + 0.5);
      flt.frequency.linearRampToValueAtTime(150, t + 0.8);
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0.5, t);
      g.gain.linearRampToValueAtTime(0.3, t + 0.3);
      g.gain.exponentialRampToValueAtTime(0.001, t + 1.2);
      noise.connect(flt); flt.connect(g); g.connect(audioCtx.destination);
      noise.start(t); noise.stop(t + 1.2);

      const o = audioCtx.createOscillator(); o.type = 'sine';
      o.frequency.setValueAtTime(80, t);
      o.frequency.linearRampToValueAtTime(50, t + 0.5);
      o.frequency.linearRampToValueAtTime(90, t + 0.8);
      const g2 = audioCtx.createGain();
      g2.gain.setValueAtTime(0.3, t);
      g2.gain.exponentialRampToValueAtTime(0.001, t + 1);
      o.connect(g2); g2.connect(audioCtx.destination);
      o.start(t); o.stop(t + 1);
    }

    function playMatchSound() {
      const t = audioCtx.currentTime;
      [523, 659, 784, 1047].forEach((f, i) => {
        const o = audioCtx.createOscillator(); o.type = 'sine'; o.frequency.value = f;
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(0, t + i * 0.1);
        g.gain.linearRampToValueAtTime(0.2, t + i * 0.1 + 0.05);
        g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.1 + 0.3);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(t + i * 0.1); o.stop(t + i * 0.1 + 0.3);
      });
    }

    function playWinSound() {
      const t = audioCtx.currentTime;
      [523, 587, 659, 698, 784, 880, 988, 1047].forEach((f, i) => {
        const o = audioCtx.createOscillator(); o.type = 'sine'; o.frequency.value = f;
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(0.25, t + i * 0.12);
        g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.12 + 0.4);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(t + i * 0.12); o.stop(t + i * 0.12 + 0.4);
      });
    }

    function playPanicTone(speed) {
      const t = audioCtx.currentTime;
      const f = 300 + (1 - speed) * 800;
      const o = audioCtx.createOscillator(); o.type = 'square';
      o.frequency.setValueAtTime(f, t);
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0.08, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(t); o.stop(t + 0.15);
    }

    // ====== UI HELPERS ======
    function showMessage(text, color = '#fff') {
      const el = document.getElementById('message');
      el.textContent = text;
      el.style.color = color;
      el.style.transition = 'none';
      el.style.opacity = 1;
      setTimeout(() => { el.style.transition = 'opacity 1s'; el.style.opacity = 0; }, 1500);
    }

    function showCommentary(text) {
      const komm = document.getElementById('commentator');
      document.getElementById('kommText').textContent = text;
      komm.classList.add('show');
      clearTimeout(komm._hideTimer);
      komm._hideTimer = setTimeout(() => komm.classList.remove('show'), 4000);
    }

    function randomFrom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function spawnConfetti() {
      const colors = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff6bcb','#a855f7'];
      for (let i = 0; i < 100; i++) {
        const c = document.createElement('div');
        c.className = 'confetti';
        c.style.left = Math.random() * 100 + 'vw';
        c.style.background = colors[Math.floor(Math.random() * colors.length)];
        c.style.animationDuration = (2 + Math.random() * 3) + 's';
        c.style.animationDelay = Math.random() * 1.5 + 's';
        c.style.width = (6 + Math.random() * 12) + 'px';
        c.style.height = (6 + Math.random() * 12) + 'px';
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 5500);
      }
    }

    function spawnFartCloud() {
      const clouds = ['💨', '☁️', '💀', '🤢'];
      for (let i = 0; i < 6; i++) {
        const el = document.createElement('div');
        el.className = 'fart-cloud';
        el.textContent = randomFrom(clouds);
        el.style.left = (20 + Math.random() * 60) + 'vw';
        el.style.top = (30 + Math.random() * 40) + 'vh';
        el.style.animationDelay = (Math.random() * 0.5) + 's';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 2500);
      }
    }

    // ====== DIFFICULTY ======
    function setDifficulty(diff) {
      difficulty = diff;
      document.querySelectorAll('#diffSelect button').forEach(b => b.classList.remove('active'));
      document.querySelector(`#diffSelect button[onclick="setDifficulty('${diff}')"]`).classList.add('active');
      startGame();
    }

    // ====== TIMER ======
    function startTimer() {
      clearInterval(timerInterval);
      clearInterval(panicInterval);
      const maxTime = difficulty === 'easy' ? 180 : difficulty === 'hard' ? 120 : 90;
      timeLeft = maxTime;
      updateTimerDisplay();

      timerInterval = setInterval(() => {
        timeLeft--;
        updateTimerDisplay();
        const ratio = timeLeft / maxTime;

        // Panic mode
        const timerEl = document.getElementById('timer');
        if (ratio < 0.25) {
          timerEl.classList.add('panic');
          if (!panicInterval) {
            panicInterval = setInterval(() => playPanicTone(ratio), 500);
          }
        } else {
          timerEl.classList.remove('panic');
        }

        // Emojis grow over time
        emojiScale = 2.5 + (1 - ratio) * 2;
        document.querySelectorAll('.card .emoji').forEach(e => {
          e.style.fontSize = emojiScale + 'rem';
        });

        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          clearInterval(panicInterval);
          panicInterval = null;
          locked = true;
          showMessage('ZEIT ABGELAUFEN!', '#ff6b6b');
          showCommentary('Die Zeit ist um! Das war... naja...');
          showHighscores(false);
        }
      }, 1000);
    }

    function updateTimerDisplay() {
      const m = Math.floor(timeLeft / 60);
      const s = timeLeft % 60;
      document.getElementById('timer').textContent = `⏱ ${m}:${s.toString().padStart(2, '0')}`;
    }

    // ====== POWER-UPS ======
    function useXray() {
      if (xrayUses <= 0 || locked) return;
      xrayUses--;
      document.getElementById('btnXray').disabled = true;
      document.getElementById('btnXray').textContent = '🔍 Verbraucht';
      document.getElementById('xrayOverlay').classList.add('show');
      showCommentary('ROENTGENBLICK AKTIVIERT! Alles wird sichtbar!');

      // Flip all unmatched cards
      cardElements.forEach((el, i) => {
        if (!el.classList.contains('matched')) {
          el.classList.add('flipped');
        }
      });
      locked = true;

      setTimeout(() => {
        cardElements.forEach((el) => {
          if (!el.classList.contains('matched') && !el.classList.contains('frozen')) {
            el.classList.remove('flipped');
          }
        });
        // Keep frozen cards flipped
        if (frozenCard !== null) {
          cardElements[frozenCard].classList.add('flipped');
        }
        document.getElementById('xrayOverlay').classList.remove('show');
        locked = false;
      }, 2000);
    }

    function useFreeze() {
      if (freezeUses <= 0 || locked) return;
      if (flippedCards.length !== 1) {
        showMessage('Dreh erst eine Karte um!', '#74b9ff');
        return;
      }
      freezeUses--;
      document.getElementById('btnFreeze').textContent = `❄️ Freeze (${freezeUses}x)`;
      if (freezeUses <= 0) document.getElementById('btnFreeze').disabled = true;

      const fc = flippedCards[0];
      fc.el.classList.add('frozen');
      frozenCard = fc.index;
      flippedCards = [];
      showCommentary('EINGEFROREN! Diese Karte bleibt offen!');
    }

    function toggleNight() {
      nightMode = !nightMode;
      document.body.classList.toggle('night-mode', nightMode);
      document.getElementById('btnNight').textContent = nightMode ? '☀️ Tag-Modus' : '🌙 Nacht-Modus';
      if (nightMode) {
        showCommentary('NACHT-MODUS! Nur mit Taschenlampe... viel Glueck!');
      }
    }

    // Flashlight follows mouse in night mode
    document.addEventListener('mousemove', (e) => {
      if (!nightMode) return;
      const fl = document.getElementById('flashlight');
      fl.style.background = `radial-gradient(circle 120px at ${e.clientX}px ${e.clientY}px, transparent 0%, rgba(0,0,0,0.97) 100%)`;
    });

    // ====== MOGEL-KARTEN (card swapping) ======
    function mogelSwap() {
      if (difficulty === 'easy') return;
      // Swap 2 random unmatched, unflipped cards
      const available = [];
      cardElements.forEach((el, i) => {
        if (!el.classList.contains('matched') && !el.classList.contains('flipped') && frozenCard !== i) {
          available.push(i);
        }
      });
      if (available.length < 2) return;
      shuffle(available);
      const [a, b] = [available[0], available[1]];
      // Swap in data
      [cards[a], cards[b]] = [cards[b], cards[a]];
      // Swap emoji display
      const emojiA = cardElements[a].querySelector('.emoji');
      const emojiB = cardElements[b].querySelector('.emoji');
      [emojiA.textContent, emojiB.textContent] = [emojiB.textContent, emojiA.textContent];
    }

    // ====== TROLL-KARTE ======
    function maybeSpawnTroll() {
      if (trollActive) return;
      if (difficulty === 'easy') return;
      const chance = difficulty === 'chaos' ? 0.15 : 0.08;
      if (Math.random() > chance) return;

      trollActive = true;
      // Pick a random unmatched card position
      const available = [];
      cardElements.forEach((el, i) => {
        if (!el.classList.contains('matched') && !el.classList.contains('flipped') && frozenCard !== i) {
          available.push(i);
        }
      });
      if (available.length === 0) { trollActive = false; return; }

      const trollIdx = randomFrom(available);
      const el = cardElements[trollIdx];
      el.classList.add('troll-card');
      // Change back text to troll
      el.querySelector('.back').textContent = '👹';

      // If not clicked within 3s, disappear
      const trollTimer = setTimeout(() => {
        el.classList.remove('troll-card');
        el.querySelector('.back').textContent = '?';
        trollActive = false;
      }, 3000);

      el._trollHandler = () => {
        clearTimeout(trollTimer);
        el.classList.remove('troll-card');
        el.querySelector('.back').textContent = '?';
        // Troll effect: flip back all non-matched flipped cards
        playSound({ type: 'troll', freq: 0 });
        showCommentary(randomFrom(commentaryTroll));
        showMessage('TROLL-KARTE! 👹', '#e17055');

        // Shake board
        document.getElementById('board').classList.add('board-fart');
        setTimeout(() => document.getElementById('board').classList.remove('board-fart'), 800);

        // Flip back everything
        cardElements.forEach((c, i) => {
          if (!c.classList.contains('matched') && frozenCard !== i) {
            c.classList.remove('flipped');
          }
        });
        flippedCards = [];
        trollActive = false;
        el.removeEventListener('click', el._trollHandler);
      };
      el.addEventListener('click', el._trollHandler);
    }

    // ====== DRUNK MODE ======
    function applyDrunk() {
      if (difficulty === 'easy') return;
      const intensity = difficulty === 'chaos' ? 1 : 0.4;
      drunkAngle += (Math.random() - 0.5) * 2 * intensity;
      drunkAngle = Math.max(-5, Math.min(5, drunkAngle));
      const tx = (Math.random() - 0.5) * 10 * intensity;
      const ty = (Math.random() - 0.5) * 5 * intensity;
      document.getElementById('boardWrapper').style.transform =
        `rotate(${drunkAngle}deg) translate(${tx}px, ${ty}px)`;

      // In chaos mode, also shuffle card positions visually
      if (difficulty === 'chaos' && Math.random() > 0.7) {
        cardElements.forEach(el => {
          if (!el.classList.contains('matched')) {
            el.style.transform += ` translate(${(Math.random()-0.5)*4}px, ${(Math.random()-0.5)*4}px)`;
          }
        });
      }
    }

    // ====== HIGHSCORES ======
    function showHighscores(won) {
      const panel = document.getElementById('highscorePanel');
      const list = document.getElementById('highscoreList');
      panel.classList.add('show');

      // Generate fake bot scores
      const bots = shuffle([...botNames]).slice(0, 8).map(name => ({
        name,
        score: Math.floor(15 + Math.random() * 35),
        isBot: true
      }));

      if (won) {
        bots.push({ name: '➡️ DU', score: attempts, isBot: false });
      }

      bots.sort((a, b) => a.score - b.score);

      list.innerHTML = bots.map((b, i) => `
        <div class="hs-row ${b.isBot ? '' : 'you'}">
          <span>#${i + 1} ${b.name}</span>
          <span>${b.score} Versuche</span>
        </div>
      `).join('');
    }

    // ====== IDLE COMMENTARY ======
    function startIdleCheck() {
      clearInterval(idleInterval);
      idleInterval = setInterval(() => {
        if (Date.now() - lastActionTime > 8000 && matchedPairs < 15 && timeLeft > 0) {
          showCommentary(randomFrom(commentarySlow));
          lastActionTime = Date.now();
        }
      }, 8000);
    }

    // ====== MAIN GAME ======
    function startGame() {
      matchedPairs = 0;
      attempts = 0;
      combo = 0;
      consecutiveMisses = 0;
      flippedCards = [];
      locked = false;
      frozenCard = null;
      trollActive = false;
      emojiScale = 2.5;
      drunkAngle = 0;
      xrayUses = 1;
      freezeUses = 2;
      lastActionTime = Date.now();

      document.getElementById('pairs').textContent = '0';
      document.getElementById('attempts').textContent = '0';
      document.getElementById('comboDisplay').classList.remove('show');
      document.getElementById('win').classList.remove('show');
      document.getElementById('highscorePanel').classList.remove('show');
      document.getElementById('message').textContent = '';
      document.getElementById('boardWrapper').style.transform = '';
      document.getElementById('btnXray').disabled = false;
      document.getElementById('btnXray').textContent = '🔍 Roentgenblick (1x)';
      document.getElementById('btnFreeze').disabled = false;
      document.getElementById('btnFreeze').textContent = '❄️ Freeze (2x)';
      if (nightMode) toggleNight();

      cards = shuffle([...characters, ...characters].map((c, i) => ({ ...c, id: i })));
      cardElements = [];
      const board = document.getElementById('board');
      board.innerHTML = '';

      cards.forEach((char, index) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="back">?</div>
          <div class="front"><span class="emoji">${char.emoji}</span></div>
        `;
        card.addEventListener('click', () => flipCard(card, index));
        board.appendChild(card);
        cardElements.push(card);
      });

      startTimer();
      startIdleCheck();

      setTimeout(() => showCommentary(randomFrom(commentaryStart)), 500);
    }

    function flipCard(cardEl, index) {
      if (locked) return;
      if (cardEl.classList.contains('flipped') && frozenCard !== index) return;
      if (cardEl.classList.contains('matched')) return;
      if (flippedCards.length >= 2) return;
      if (frozenCard === index) return; // Can't click frozen card again

      lastActionTime = Date.now();
      cardEl.classList.add('flipped');
      playSound(cards[index]);

      flippedCards.push({ el: cardEl, index });

      if (flippedCards.length === 2) {
        attempts++;
        document.getElementById('attempts').textContent = attempts;

        const [a, b] = flippedCards;
        if (cards[a.index].emoji === cards[b.index].emoji) {
          // === MATCH ===
          locked = true;
          consecutiveMisses = 0;
          combo++;

          setTimeout(() => {
            a.el.classList.add('matched', 'dancing');
            b.el.classList.add('matched', 'dancing');
            if (frozenCard === a.index || frozenCard === b.index) {
              a.el.classList.remove('frozen');
              b.el.classList.remove('frozen');
              frozenCard = null;
            }
            playMatchSound();
            matchedPairs++;
            document.getElementById('pairs').textContent = matchedPairs;

            // Combo display
            if (combo >= 2) {
              const cd = document.getElementById('comboDisplay');
              cd.textContent = `COMBO x${combo}!`;
              cd.classList.add('show');
              cd.style.animation = 'none';
              cd.offsetHeight; // trigger reflow
              cd.style.animation = '';
              showCommentary(randomFrom(commentaryCombo) + ` (x${combo})`);
              // Extra confetti for combos
              spawnConfetti();
            } else {
              showCommentary(randomFrom(commentaryMatch));
            }

            showMessage(randomFrom(matchMessages) + (combo >= 2 ? ` COMBO x${combo}!` : ''), '#00e676');
            flippedCards = [];
            locked = false;

            // Stop dancing after a while
            setTimeout(() => {
              a.el.classList.remove('dancing');
              b.el.classList.remove('dancing');
            }, 3000);

            if (matchedPairs === 15) {
              clearInterval(timerInterval);
              clearInterval(panicInterval);
              panicInterval = null;
              setTimeout(() => {
                playWinSound();
                spawnConfetti();
                setTimeout(spawnConfetti, 1000);
                setTimeout(spawnConfetti, 2000);
                showCommentary(randomFrom(commentaryWin));
                const winText = document.getElementById('winText');
                winText.innerHTML = `🎉 GEWONNEN! 🎉<br>
                  <span style="font-size:1.3rem">
                    ${attempts} Versuche | Max Combo: x${combo}<br>
                    ${difficulty.toUpperCase()} Modus
                  </span>`;
                document.getElementById('win').classList.add('show');
                showHighscores(true);
              }, 500);
            }
          }, 400);
        } else {
          // === NO MATCH ===
          locked = true;
          combo = 0;
          consecutiveMisses++;
          document.getElementById('comboDisplay').classList.remove('show');

          const flipBackDelay = difficulty === 'easy' ? 1500 : difficulty === 'hard' ? 1000 : 700;

          setTimeout(() => {
            a.el.classList.add('shake');
            b.el.classList.add('shake');
            showMessage(randomFrom(funnyMessages), '#ff6b6b');

            // Commentary on miss
            if (Math.random() > 0.4) showCommentary(randomFrom(commentaryMiss));

            // FART after 3 consecutive misses
            if (consecutiveMisses >= 3) {
              consecutiveMisses = 0;
              playFartSound();
              spawnFartCloud();
              document.getElementById('board').classList.add('board-fart');
              setTimeout(() => document.getElementById('board').classList.remove('board-fart'), 800);
              showCommentary(randomFrom(commentaryFart));
              showMessage('💨 FURZ-ALARM! 💨', '#a0e080');
            }
          }, 400);

          setTimeout(() => {
            a.el.classList.remove('flipped', 'shake');
            b.el.classList.remove('flipped', 'shake');
            // Keep frozen card flipped
            if (frozenCard === a.index) a.el.classList.add('flipped');
            if (frozenCard === b.index) b.el.classList.add('flipped');
            flippedCards = [];
            locked = false;

            // Mogel: swap cards after miss (hard/chaos)
            if (difficulty !== 'easy' && Math.random() > 0.5) {
              mogelSwap();
            }

            // Drunk mode: tilt board
            applyDrunk();

            // Maybe spawn troll card
            maybeSpawnTroll();
          }, flipBackDelay);
        }
      }
    }

    // Start!
    startGame();
  </script>
</body>
</html>
